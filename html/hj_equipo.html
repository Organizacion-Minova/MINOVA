<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dino Game</title>
    <style>
        *{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    background:#f5f5f5;
    font-family:Arial,sans-serif;
}

.game{
    width:800px;
    height:250px;
    border:2px solid #333;
    position:relative;
    overflow:hidden;
    background:white;
}

.game::after{
    content:"";
    position:absolute;
    bottom:0;
    width:100%;
    height:3px;
    background:#333;
}

#dino{
    width:50px;
    height:50px;
    background:#333;
    position:absolute;
    bottom:0;
    left:50px;
}

.jump{
    animation:jump .6s linear;
}

@keyframes jump{
    0%{bottom:0;}
    50%{bottom:120px;}
    100%{bottom:0;}
}

#cactus{
    width:25px;
    height:60px;
    background:green;
    position:absolute;
    bottom:0;
    right:-50px;
}

.move{
    animation:move 1.5s linear infinite;
}

@keyframes move{
    from{
        right:-50px;
    }
    to{
        right:850px;
    }
}

#score{
    position:absolute;
    top:10px;
    right:20px;
    font-size:24px;
    font-weight:bold;
}

#gameOver{
    margin-top:20px;
    color:red;
}
    </style>
</head>
<body>

    <div class="game">
        <div id="score">0</div>
        <div id="dino"></div>
        <div id="cactus"></div>
    </div>

    <h2 id="gameOver"></h2>

    <script >const dino = document.getElementById("dino");
const cactus = document.getElementById("cactus");
const scoreText = document.getElementById("score");
const gameOverText = document.getElementById("gameOver");

let score = 0;
let gameOver = false;

cactus.classList.add("move");

function jump() {

    if (dino.classList.contains("jump")) return;

    dino.classList.add("jump");

    setTimeout(() => {
        dino.classList.remove("jump");
    }, 600);
}

document.addEventListener("keydown", (e) => {

    if (e.code === "Space" || e.code === "ArrowUp") {

        if (!gameOver) {
            jump();
        } else {
            location.reload();
        }
    }
});

const scoreInterval = setInterval(() => {

    if (!gameOver) {
        score++;
        scoreText.textContent = score;
    }

}, 100);

const collision = setInterval(() => {

    const dinoBottom =
        parseInt(window.getComputedStyle(dino).getPropertyValue("bottom"));

    const cactusLeft =
        parseInt(window.getComputedStyle(cactus).getPropertyValue("right"));

    const cactusPosition = 800 - cactusLeft;

    if (
        cactusPosition > 50 &&
        cactusPosition < 100 &&
        dinoBottom < 50
    ) {

        gameOver = true;

        cactus.style.animation = "none";

        gameOverText.textContent =
            `GAME OVER - Puntuación: ${score} (Presiona Espacio para reiniciar)`;

        clearInterval(scoreInterval);
    }

}, 10);</script>

</body>
</html>
