<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dino Chrome</title>
    <style>
        *{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#f7f7f7;
    font-family:Arial,Helvetica,sans-serif;
}

.game{
    width:1000px;
    height:300px;
    border-bottom:3px solid #535353;
    position:relative;
    overflow:hidden;
    background:#fff;
}

.score-board{
    position:absolute;
    top:20px;
    right:20px;
    display:flex;
    gap:20px;
    color:#555;
    font-size:24px;
    font-weight:bold;
}

#dino{
    width:50px;
    height:55px;
    position:absolute;
    bottom:0;
    left:60px;
    background:#444;
    border-radius:4px;
}

#dino::before,
#dino::after{
    content:"";
    position:absolute;
    width:10px;
    height:20px;
    background:#444;
    bottom:-15px;
}

#dino::before{
    left:8px;
}

#dino::after{
    right:8px;
}

.jump{
    animation:jump .65s ease-out;
}

@keyframes jump{

    0%{
        bottom:0;
    }

    50%{
        bottom:140px;
    }

    100%{
        bottom:0;
    }

}

.cactus{
    position:absolute;
    bottom:0;
    background:#2f8a2f;
    border-radius:2px;
}

.small{
    width:22px;
    height:50px;
}

.large{
    width:30px;
    height:70px;
}

.cloud{
    position:absolute;
    width:60px;
    height:25px;
    background:#ddd;
    border-radius:30px;
}

.cloud::before{
    content:"";
    position:absolute;
    width:30px;
    height:30px;
    left:8px;
    top:-10px;
    background:#ddd;
    border-radius:50%;
}

.cloud::after{
    content:"";
    position:absolute;
    width:35px;
    height:35px;
    right:8px;
    top:-15px;
    background:#ddd;
    border-radius:50%;
}

#ground{
    position:absolute;
    bottom:0;
    width:3000px;
    height:4px;
    background:repeating-linear-gradient(
        90deg,
        #444 0 25px,
        transparent 25px 40px
    );
}

#game-over{
    position:absolute;
    inset:0;
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    gap:10px;
    background:rgba(255,255,255,.9);
}

#game-over h2{
    color:#333;
}

#game-over p{
    color:#666;
}
    </style>
</head>
<body>

    <div class="game">

        <div class="score-board">
            <span id="record">HI 00000</span>
            <span id="score">00000</span>
        </div>

        <div id="clouds"></div>

        <div id="dino"></div>

        <div id="ground"></div>

        <div id="game-over">
            <h2>GAME OVER</h2>
            <p>Presiona ESPACIO para reiniciar</p>
        </div>

    </div>

    <script >const game = document.querySelector(".game");
const dino = document.getElementById("dino");
const scoreEl = document.getElementById("score");
const recordEl = document.getElementById("record");
const gameOverEl = document.getElementById("game-over");
const cloudsContainer = document.getElementById("clouds");

let jumping = false;
let gameOver = false;

let score = 0;
let record = Number(localStorage.getItem("record")) || 0;

let speed = 7;

recordEl.textContent = `HI ${record.toString().padStart(5,"0")}`;

function jump(){

    if(jumping || gameOver) return;

    jumping = true;

    dino.classList.add("jump");

    setTimeout(()=>{
        dino.classList.remove("jump");
        jumping = false;
    },650);
}

document.addEventListener("keydown",(e)=>{

    if(e.code==="Space" || e.code==="ArrowUp"){

        if(gameOver){
            location.reload();
            return;
        }

        jump();
    }
});

function createObstacle(){

    if(gameOver) return;

    const cactus = document.createElement("div");

    const large = Math.random() > 0.5;

    cactus.classList.add("cactus");
    cactus.classList.add(large ? "large" : "small");

    cactus.style.left = "1000px";

    game.appendChild(cactus);

    let pos = 1000;

    const move = setInterval(()=>{

        if(gameOver){
            clearInterval(move);
            return;
        }

        pos -= speed;

        cactus.style.left = pos + "px";

        const dinoRect = dino.getBoundingClientRect();
        const cactusRect = cactus.getBoundingClientRect();

        if(
            dinoRect.left < cactusRect.right &&
            dinoRect.right > cactusRect.left &&
            dinoRect.bottom > cactusRect.top &&
            dinoRect.top < cactusRect.bottom
        ){
            endGame();
        }

        if(pos < -60){
            cactus.remove();
            clearInterval(move);
        }

    },20);

    const next =
        Math.random() * 1800 + 1000;

    setTimeout(createObstacle,next);
}

function createCloud(){

    if(gameOver) return;

    const cloud = document.createElement("div");

    cloud.className = "cloud";

    cloud.style.left = "1000px";
    cloud.style.top =
        Math.random()*100 + 30 + "px";

    cloudsContainer.appendChild(cloud);

    let pos = 1000;

    const move = setInterval(()=>{

        pos -= 2;

        cloud.style.left = pos + "px";

        if(pos < -100){
            cloud.remove();
            clearInterval(move);
        }

    },20);

    setTimeout(
        createCloud,
        Math.random()*4000 + 2000
    );
}

function updateScore(){

    if(gameOver) return;

    score++;

    scoreEl.textContent =
        score.toString().padStart(5,"0");

    if(score > record){

        record = score;

        localStorage.setItem(
            "record",
            record
        );

        recordEl.textContent =
            `HI ${record
                .toString()
                .padStart(5,"0")}`;
    }

    if(score % 200 === 0){
        speed += 0.5;
    }
}

function endGame(){

    gameOver = true;

    gameOverEl.style.display = "flex";
}

setInterval(updateScore,100);

createObstacle();
createCloud();</script>

</body>
</html>
